version: "3"
services:
  loki:
    container_name: loki
    image: grafana/loki:main
    volumes:
      - /docker/grafana-monitoring/loki:/etc/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    
  promtail:
    container_name: promtail
    image: grafana/promtail:main
    volumes:
      - /var/log:/var/log:ro
      - /docker/grafana-monitoring/promtail:/etc/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "1514:1514" # this is only needed if you are going to send syslogs
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    
  grafana:
    user: "0"
    ports:
      - 3000:3000
    container_name: grafana
    image: grafana/grafana-oss:main-ubuntu
    volumes:
    - /docker/grafana-monitoring/grafana:/var/lib/grafana
    restart: unless-stopped
      
  influxdb:
    container_name: influxdb
    image: influxdb:latest
    restart: unless-stopped
    ports:
      - 8086:8086
      - 8089:8089/udp
    volumes:
      - /docker/grafana-monitoring/influxdb:/var/lib/influxdb2
      
  telegraf:
    container_name: telegraf
    restart: unless-stopped
    volumes:
        - '/docker/grafana-monitoring/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro'
        - '/:/hostfs:ro' # to monitor docker-vm
        - '/var/run/docker.sock:/var/run/docker.sock' # to monitor docker containers
        - '/docker/grafana-monitoring/telegraf/mibs:/usr/share/snmp/mibs' # mibs files [e.g., sophos]
    environment:
        - HOST_ETC=/hostfs/etc
        - HOST_PROC=/hostfs/proc
        - HOST_SYS=/hostfs/sys
        - HOST_VAR=/hostfs/var
        - HOST_RUN=/hostfs/run
        - HOST_MOUNT_PREFIX=/hostfs
    image: telegraf:latest
    user: telegraf:999
    
  prometheus:

    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - /docker/grafana-monitoring/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml

networks:
  default:
    name: network_default
    external: true