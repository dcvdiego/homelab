global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets:
          - 192.168.1.224:9100  # docker-prod (LXC 101)
          - 192.168.1.248:9100  # docker-tower (LXC 104)
          - 192.168.1.148:9100  # pvehost (Proxmox)
        labels:
          env: homelab
