version: '3.8'

services:
  prowlarr:
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 9696:9696
    hostname: prowlarr
    image: ghcr.io/hotio/prowlarr:release
    restart: unless-stopped
    volumes:
      - /data:/data
      - /docker/prowlarr/Definitions/Custom:/Custom
      - /docker/prowlarr:/config

  radarr:
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 7878:7878
    hostname: radarr
    image: ghcr.io/hotio/radarr:release
    restart: unless-stopped
    volumes:
      - /data:/data
      - /docker/radarr:/config
      - /docker/scripts:/scripts
      - /usr/bin/rclone:/usr/bin/rclone
    # depends_on:
    #   - rclone

  sonarr:
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 8989:8989
    hostname: sonarr
    image: ghcr.io/hotio/sonarr:release
    restart: unless-stopped
    volumes:
      - /data:/data
      - /docker/scripts:/scripts
      - /docker/sonarr:/config
      - /usr/bin/rclone:/usr/bin/rclone
